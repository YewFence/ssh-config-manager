[package]
name = "sshm"
repository = "https://github.com/YewFence/ssh-config-manager"
version = "0.0.2"
description = "Manage ~/.ssh/config with ease"
license = "MIT"
edition = "2024"
authors = ["YewFence"]

[[bin]]
name = "sshm"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
inquire = "0.9"
anyhow = "1"
comfy-table = "7"
dirs = "6"

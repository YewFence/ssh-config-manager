name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Pre-release version (without leading v, for example 0.0.6-rc.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: "sshm"

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      draft: ${{ steps.meta.outputs.draft }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      publish_downstream: ${{ steps.meta.outputs.publish_downstream }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            if [[ "$VERSION" == v* ]]; then
              echo "Manual version input must not start with 'v': $VERSION" >&2
              exit 1
            fi
            TAG_NAME="v${VERSION}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "draft=false" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "publish_downstream=false" >> $GITHUB_OUTPUT
            echo "release_name=Pre-release ${VERSION}" >> $GITHUB_OUTPUT
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "draft=true" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "publish_downstream=true" >> $GITHUB_OUTPUT
            echo "release_name=Release ${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.release_name }}
          draft: ${{ steps.meta.outputs.draft }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-amd64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            platform: linux-arm64

          - target: x86_64-apple-darwin
            os: macos-latest
            platform: macos-amd64

          - target: aarch64-apple-darwin
            os: macos-latest
            platform: macos-arm64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --locked --verbose

      - name: Determine artifact names
        id: names
        shell: bash
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "binary=${{ env.BIN_NAME }}.exe" >> $GITHUB_OUTPUT
          else
            echo "binary=${{ env.BIN_NAME }}" >> $GITHUB_OUTPUT
          fi
          echo "archive=${{ env.BIN_NAME }}-v${VERSION}-${{ matrix.platform }}.zip" >> $GITHUB_OUTPUT

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ steps.names.outputs.binary }}

      - name: Create release archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${{ steps.names.outputs.binary }}"
          DEST="${{ steps.names.outputs.archive }}"
          zip -j "$DEST" "$SRC"

      - name: Create release archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $src = "target/${{ matrix.target }}/release/${{ steps.names.outputs.binary }}"
          $dest = "${{ steps.names.outputs.archive }}"
          Compress-Archive -Path $src -DestinationPath $dest -Force

      - name: Upload binary to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create-release.outputs.tag_name }}
          draft: ${{ needs.create-release.outputs.draft }}
          prerelease: ${{ needs.create-release.outputs.prerelease }}
          files: ${{ steps.names.outputs.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    if: needs.create-release.outputs.publish_downstream == 'true'
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Dry run publish
        run: cargo publish --dry-run --locked

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    if: needs.create-release.outputs.publish_downstream == 'true'
    needs: [create-release, build]
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew Formula
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          BIN="${{ env.BIN_NAME }}"
          REPO="${{ github.repository }}"
          TAP_OWNER="${{ vars.HOMEBREW_TAP_OWNER }}"
          TAP_REPO="${{ vars.HOMEBREW_TAP_REPO }}"
          CLASS_NAME="${{ vars.HOMEBREW_FORMULA_CLASS }}"
          DESC="${{ vars.PROJECT_DESCRIPTION }}"

          if [ -z "$TAP_OWNER" ] || [ -z "$TAP_REPO" ]; then
            echo "HOMEBREW_TAP_OWNER or HOMEBREW_TAP_REPO not set, skipping Homebrew update"
            exit 0
          fi

          chmod +x ./scripts/update-homebrew.sh ./scripts/generate-homebrew-formula.sh
          ./scripts/update-homebrew.sh \
            "$VERSION" \
            "$BIN" \
            "$REPO" \
            "$TAP_OWNER" \
            "$TAP_REPO" \
            "${CLASS_NAME:-Sshm}" \
            "${DESC:-SSH config manager CLI}"

  publish-release:
    name: Publish Release
    if: needs.create-release.outputs.publish_downstream == 'true'
    needs: [create-release, build, publish-crates, update-homebrew]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const draft = releases.find(r => r.tag_name === '${{ needs.create-release.outputs.tag_name }}');
            if (!draft) {
              core.setFailed('Draft release not found');
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: draft.id,
              draft: false,
            });
            console.log(`Release published: ${draft.html_url}`);
